<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activar tu Aura - Instrucciones</title>
    <meta name="description" content="Aprende a activar tu pulsera Aura en 3 simples pasos.">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-primary': '#006FFF',
                        'brand-secondary': '#C3DDFF',
                        'text-title': '#1A1A1A',
                        'text-body': '#4A4A4A',
                        'surface-main': '#FFFFFF',
                        'surface-secondary': '#FAFAFA',
                        'status-success': '#22C55E',
                        'line': '#C4C4C4',
                        'cta': '#CA8A04',
                    },
                    spacing: {
                        'container-padding-pc': '64px',
                        'container-padding-mb': '16px',
                        'spacing-2xl': '80px',
                        'spacing-2xl-mb': '40px',
                        'spacing-lg': '48px',
                        'spacing-lg-mb': '24px',
                        'spacing-md': '32px',
                        'spacing-md-mb': '16px',
                        'spacing-sm': '16px',
                        'spacing-sm-mb': '12px',
                        'spacing-xs': '8px',
                        'spacing-xs-mb': '8px',
                    },
                    borderRadius: {
                        'radius-xl': '40px',
                        'radius-xl-mb': '24px',
                        'radius-lg': '24px',
                        'radius-lg-mb': '16px',
                        'radius-md': '12px',
                        'radius-full': '9999px',
                    },
                    fontSize: {
                        'aura-h2': '48px', 'aura-h2-mb': '32px',
                        'aura-h3': '32px', 'aura-h3-mb': '24px',
                        'aura-h4': '28px', 'aura-h4-mb': '20px',
                        'aura-sub': '22px', 'aura-sub-mb': '16px',
                        'aura-body': '20px', 'aura-body-mb': '18px',
                        'aura-small': '14px',
                    },
                    fontFamily: {
                        heading: ['"Plus Jakarta Sans"', 'sans-serif'],
                        body: ['"Inter"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: #1A1A1A;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .premium-shadow {
            box-shadow: 0 4px 24px -4px rgba(15, 23, 42, 0.04), 0 16px 40px -8px rgba(15, 23, 42, 0.08);
        }
    </style>
</head>

<body class="antialiased selection:bg-brand-primary selection:text-white">
    <div id="root"></div>

    <script type="text/babel">

        // ── ICONS ──
        const QrCode = ({ className = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /><rect x="14" y="14" width="3" height="3" /><line x1="14" y1="18" x2="17" y2="18" /><line x1="17" y1="14" x2="17" y2="17" /><line x1="20" y1="14" x2="20" y2="20" /><line x1="17" y1="20" x2="20" y2="20" /></svg>;
        const ClipboardList = ({ className = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><rect x="8" y="2" width="8" height="4" rx="1" ry="1" /><line x1="9" y1="12" x2="15" y2="12" /><line x1="9" y1="16" x2="13" y2="16" /></svg>;
        const ShieldCheck = ({ className = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><polyline points="9 12 11 14 15 10" /></svg>;
        const ArrowRight = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>;
        const ChevronLeft = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6" /></svg>;

        // ── LOGO ──
        const Logo = () => (
            <a href="/" className="flex items-center transition-transform hover:scale-105 active:scale-95">
                <img src="./assets/logo-brand.png" alt="Aura Smartcare" className="h-8 md:h-10 w-auto object-contain" />
            </a>
        );

        const ActivarPage = () => {
            const steps = [
                {
                    number: "01",
                    icon: <QrCode className="w-7 h-7" />,
                    color: "bg-brand-secondary text-brand-primary",
                    title: "Escanea el QR de tu pulsera",
                    desc: "Abre la cámara de tu iPhone o Android. No necesitas ninguna app especial. Apunta al código QR impreso en tu pulsera Aura.",
                    tip: "El QR está en la parte interior de la pulsera o en la caja de packaging."
                },
                {
                    number: "02",
                    icon: <ClipboardList className="w-7 h-7" />,
                    color: "bg-orange-100 text-orange-600",
                    title: "Llena la ficha médica",
                    desc: "El escaneo abrirá automáticamente un formulario en tu navegador. Completa el nombre del portador, alergias, condiciones y un teléfono de emergencia.",
                    tip: "También crearás un PIN de 4 dígitos para poder editar la ficha en el futuro."
                },
                {
                    number: "03",
                    icon: <ShieldCheck className="w-7 h-7" />,
                    color: "bg-green-100 text-status-success",
                    title: "¡Tu pulsera está activa!",
                    desc: "Desde ese momento, cualquier persona que escanee el QR verá la información médica del portador y podrá llamar al contacto de emergencia o compartir su ubicación.",
                    tip: "Puedes editar la ficha cuando quieras volviendo a escanear el QR e ingresando tu PIN."
                },
            ];

            return (
                <div className="min-h-screen bg-surface-main font-body">

                    {/* NAVBAR simple */}
                    <header className="border-b border-line px-container-padding-mb md:px-container-padding-pc py-spacing-sm flex items-center justify-between">
                        <Logo />
                        <a href="/" className="flex items-center gap-spacing-xs-mb text-aura-small font-semibold text-text-body hover:text-brand-primary transition-colors">
                            <ChevronLeft className="w-4 h-4" />
                            Volver al inicio
                        </a>
                    </header>

                    {/* HERO */}
                    <section className="py-spacing-lg-mb md:py-spacing-lg px-container-padding-mb md:px-container-padding-pc text-center max-w-3xl mx-auto">
                        <div className="inline-flex items-center gap-spacing-xs bg-brand-secondary text-brand-primary text-aura-small font-bold px-spacing-sm py-spacing-xs-mb rounded-radius-full mb-spacing-sm">
                            <ShieldCheck className="w-4 h-4" />
                            Activación en 3 pasos
                        </div>
                        <h1 className="text-aura-h2-mb md:text-aura-h2 font-heading font-bold text-text-title mb-spacing-sm leading-tight">
                            Activa tu pulsera<br className="hidden md:block" />
                            <span className="text-brand-primary"> en menos de 2 minutos</span>
                        </h1>
                        <p className="text-aura-body-mb md:text-aura-body text-text-body leading-relaxed">
                            No necesitas crear una cuenta ni descargar ninguna app. Solo tu teléfono y la pulsera.
                        </p>
                    </section>

                    {/* STEPS */}
                    <section className="px-container-padding-mb md:px-container-padding-pc max-w-4xl mx-auto pb-spacing-lg">
                        <div className="flex flex-col gap-spacing-sm">
                            {steps.map((step, idx) => (
                                <div key={idx} className="flex flex-col md:flex-row gap-spacing-sm bg-surface-secondary rounded-radius-lg p-spacing-sm md:p-spacing-md border border-line hover:border-brand-secondary hover:shadow-card transition-all duration-300">
                                    {/* Número + ícono */}
                                    <div className="flex items-center gap-spacing-sm md:flex-col md:items-center md:w-24 shrink-0">
                                        <div className={`w-14 h-14 rounded-radius-full ${step.color} flex items-center justify-center shrink-0`}>
                                            {step.icon}
                                        </div>
                                        <span className="text-aura-h3-mb md:text-aura-h4 font-heading font-bold text-line">{step.number}</span>
                                    </div>

                                    {/* Contenido */}
                                    <div className="flex flex-col justify-center">
                                        <h3 className="text-aura-sub-mb md:text-aura-sub font-heading font-bold text-text-title mb-spacing-xs-mb">{step.title}</h3>
                                        <p className="text-aura-body-mb md:text-aura-body text-text-body leading-relaxed mb-spacing-xs">{step.desc}</p>
                                        <div className="flex items-start gap-spacing-xs bg-white rounded-radius-md px-spacing-xs py-spacing-xs-mb border border-line">
                                            <span className="text-cta font-bold text-aura-small shrink-0">💡</span>
                                            <p className="text-aura-small text-text-body">{step.tip}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* CTA final */}
                        <div className="mt-spacing-lg text-center bg-brand-primary rounded-radius-lg p-spacing-md md:p-spacing-lg relative overflow-hidden">
                            <div className="absolute top-[-20%] right-[-10%] w-[40%] h-[80%] bg-white/10 rounded-full blur-[60px] pointer-events-none"></div>
                            <h2 className="text-aura-h3-mb md:text-aura-h3 font-heading font-bold text-white mb-spacing-xs">¿Ya tienes tu pulsera?</h2>
                            <p className="text-brand-secondary text-aura-body-mb mb-spacing-md leading-relaxed">
                                Escanea el QR con la cámara de tu teléfono para comenzar la activación.
                            </p>
                            <p className="text-white/60 text-aura-small">
                                ¿Aún no tienes una?{' '}
                                <a href="/" className="text-white font-bold underline underline-offset-2 hover:text-brand-secondary transition-colors">
                                    Compra tu Aura aquí
                                </a>
                            </p>
                        </div>
                    </section>

                    {/* FOOTER mínimo */}
                    <footer className="border-t border-line px-container-padding-mb md:px-container-padding-pc py-spacing-sm flex flex-col md:flex-row items-center justify-between gap-spacing-xs text-aura-small text-text-body">
                        <Logo />
                        <p>&copy; 2026 Aura Smartcare. Todos los derechos reservados.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ActivarPage />);
    </script>
</body>

</html>
