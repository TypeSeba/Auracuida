<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Emergencia - Aura</title>
    <meta name="description" content="Información médica y de contacto vital proporcionada por Aura Smartcare.">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind Config for Design System -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        secondary: '#1E3A8A',
                        cta: '#CA8A04',
                        background: '#FAFAFA',
                        surface: '#FFFFFF',
                        textPrimary: '#020617',
                        textSecondary: '#475569',
                        textMuted: '#94A3B8',
                        borderSubtle: '#F1F5F9',
                        borderMedium: '#E2E8F0',
                    },
                    fontFamily: {
                        heading: ['"Plus Jakarta Sans"', 'sans-serif'],
                        body: ['"Inter"', 'sans-serif'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(15, 23, 42, 0.05)',
                        'glass-hover': '0 12px 48px 0 rgba(15, 23, 42, 0.1)',
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    },
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA;
            color: #020617;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        /* Premium Liquid Glass Effects */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .premium-shadow {
            box-shadow: 0 4px 24px -4px rgba(15, 23, 42, 0.04), 0 16px 40px -8px rgba(15, 23, 42, 0.08);
        }
        
        .text-balance {
            text-wrap: balance;
        }
    </style>
</head>
<body class="antialiased selection:bg-primary selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ------------- ICONS -------------
        const Phone = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        );
        const AlertCircle = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        );
        const BloodDrop = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
        );
        const Activity = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        );
        const Info = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        );
        const CheckCircle = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        );
        const ShieldAlert = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        );

        // ------------- COMPONENTS -------------
        const Button = ({ children, variant = "primary", className = "", ...props }) => {
            const baseClasses = "inline-flex items-center justify-center font-bold rounded-full transition-all duration-300 ease-out cursor-pointer active:scale-95 px-6 py-3";
            const variants = {
                primary: "bg-primary text-white hover:bg-slate-800 hover:shadow-lg hover:-translate-y-0.5 shadow-md",
                secondary: "bg-white text-primary border border-borderMedium hover:bg-slate-50 hover:shadow-md hover:border-slate-300 hover:-translate-y-0.5",
                danger: "bg-red-600 text-white hover:bg-red-700 hover:shadow-lg hover:-translate-y-0.5 shadow-md",
            };
            return (
                <button className={`${baseClasses} ${variants[variant]} ${className}`} {...props}>
                    {children}
                </button>
            );
        };

        const Logo = ({ white = false }) => (
            <div className={`flex items-center gap-1 font-heading font-bold text-xl tracking-tighter ${white ? 'text-white' : 'text-primary'}`}>
                <div className={`w-5 h-5 rounded-md flex items-center justify-center ${white ? 'bg-white text-primary' : 'bg-primary text-white'}`}>
                    <span className="text-xs">A</span>
                </div>
                URA
            </div>
        );

        const AuraFicha = () => {
            return (
                <div className="bg-background min-h-screen font-body pb-12 w-full max-w-lg mx-auto md:shadow-2xl md:min-h-[800px] md:my-8 md:rounded-[40px] overflow-hidden relative border-x border-y border-borderSubtle">
                    {/* Top curved background (similar aesthetic to the dark bento box in landing) */}
                    <div className="bg-primary pt-8 pb-24 px-6 rounded-b-[48px] relative overflow-hidden shadow-lg">
                        {/* Glow / Light effect */}
                        <div className="absolute top-[-20%] right-[-20%] w-[60%] h-[80%] bg-blue-500/20 rounded-full blur-[80px] pointer-events-none"></div>
                        <div className="absolute top-[30%] left-[-10%] w-[40%] h-[40%] bg-yellow-500/10 rounded-full blur-[60px] pointer-events-none"></div>
                        
                        <div className="mx-auto relative z-10 flex flex-col items-center">
                            {/* Header: Logo and Emergency Tag */}
                            <div className="w-full flex justify-between items-center mb-8">
                                <Logo white />
                                <span className="bg-red-500/20 text-red-100 text-[10px] px-3 py-1.5 rounded-full font-bold uppercase tracking-wider border border-red-500/30 flex items-center gap-1.5 animate-pulse">
                                    <AlertCircle className="w-3 h-3" />
                                    Perfil Médico
                                </span>
                            </div>

                            {/* Profile Avatar */}
                            <div className="relative mb-5">
                                <div className="w-28 h-28 md:w-32 md:h-32 rounded-full border-[4px] border-white/10 overflow-hidden shadow-2xl relative z-10">
                                    <div className="absolute inset-0 bg-primary animate-pulse -z-10"></div>
                                    <img src="https://i.pravatar.cc/150?img=11" alt="Foto de Perfil" className="w-full h-full object-cover" />
                                </div>
                            </div>

                            <h1 className="text-3xl font-heading font-bold text-white text-center leading-tight mb-1">Mateo García</h1>
                            <p className="text-slate-300 font-medium tracking-wide">8 años • Providencia, CL</p>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="px-5 md:px-8 -mt-12 relative z-20 space-y-5">
                        
                        {/* Emergency Contact CTA */}
                        <div className="bg-white rounded-[24px] p-5 md:p-6 premium-shadow border border-gray-100 flex flex-col items-center text-center">
                            <p className="text-sm text-textSecondary mb-4 leading-relaxed font-medium">Si lo has encontrado, por favor mantén la calma y comunícate inmediatamente con sus familiares.</p>
                            <a href="tel:+56912345678" className="w-full">
                                <Button variant="danger" className="w-full flex items-center gap-3 py-4 text-[17px]">
                                    <Phone className="w-5 h-5 fill-current" />
                                    Llamar a Mamá (Clara)
                                </Button>
                            </a>
                        </div>

                        {/* Medical Data Title */}
                        <h2 className="text-[19px] font-heading font-bold text-primary pl-1 pt-2">Datos Vitales</h2>
                        
                        {/* Standard Bento Grid */}
                        <div className="grid grid-cols-2 gap-4">
                            {/* Blood Type Box */}
                            <div className="bg-red-50/50 rounded-2xl p-5 border border-red-100 flex flex-col group hover:bg-red-50 transition-colors">
                                <div className="w-10 h-10 rounded-full bg-red-100 text-red-600 flex items-center justify-center mb-4">
                                    <BloodDrop className="w-5 h-5" />
                                </div>
                                <span className="text-[11px] text-red-600 font-bold uppercase tracking-wider mb-1">Grupo Sanguíneo</span>
                                <span className="text-2xl font-heading font-bold text-red-900">O+</span>
                            </div>

                            {/* Allergies Box */}
                            <div className="bg-orange-50/50 rounded-2xl p-5 border border-orange-100 flex flex-col group hover:bg-orange-50 transition-colors">
                                <div className="w-10 h-10 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center mb-4">
                                    <ShieldAlert className="w-5 h-5" />
                                </div>
                                <span className="text-[11px] text-orange-600 font-bold uppercase tracking-wider mb-1">Alergias</span>
                                <span className="text-lg font-heading font-bold text-orange-900 leading-tight">Penicilina,<br/>Maní</span>
                            </div>
                        </div>

                        {/* Conditions / Diseases */}
                        <div className="bg-blue-50/50 hover:bg-blue-50 transition-colors rounded-2xl p-5 border border-blue-100 flex flex-col">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                                    <Activity className="w-5 h-5" />
                                </div>
                                <span className="text-sm text-blue-900 font-bold uppercase tracking-wider">Padecimientos</span>
                            </div>
                            <ul className="space-y-3">
                                <li className="flex items-start gap-3 text-blue-900">
                                    <div className="w-1.5 h-1.5 rounded-full bg-blue-400 mt-2 shrink-0"></div>
                                    <span className="font-medium">Trastorno del Espectro Autista (TEA) - Nivel 1.</span>
                                </li>
                                <li className="flex items-start gap-3 text-blue-900">
                                    <div className="w-1.5 h-1.5 rounded-full bg-blue-400 mt-2 shrink-0"></div>
                                    <span className="font-medium">Sensibilidad auditiva y visual alta.</span>
                                </li>
                            </ul>
                        </div>

                        {/* Extra Notes */}
                        <div className="bg-white rounded-[24px] p-6 premium-shadow border border-gray-100 relative overflow-hidden group">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-yellow-50 rounded-full blur-3xl -z-10 group-hover:bg-yellow-100 transition-colors"></div>
                            
                            <h3 className="text-[13px] text-textSecondary font-bold uppercase tracking-wider mb-3 flex items-center gap-2">
                                <Info className="w-4 h-4 text-cta" /> Instrucciones Adicionales
                            </h3>
                            <p className="text-primary font-medium leading-relaxed text-[15px]">
                                Mateo es muy dócil pero puede asustarse con ruidos fuertes o multitudes. Por favor háblele con voz calmada, a su altura, y no lo toque sin avisarle antes. Le gustan mucho los trenes.
                            </p>
                        </div>
                        
                        {/* Action buttons footer */}
                        <div className="pt-4 flex flex-col gap-3">
                            <Button variant="secondary" className="w-full flex items-center gap-2 py-3">
                                Compartir esta ficha
                            </Button>
                        </div>

                        {/* Powered by tag */}
                        <div className="w-full flex justify-center py-6">
                            <p className="text-xs text-textMuted font-medium flex items-center gap-1">
                                Protegido por <span className="font-heading font-bold text-textSecondary">AURA</span>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuraFicha />);
    </script>
</body>
</html>
