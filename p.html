<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Emergencia - Aura</title>
    <meta name="description" content="Información médica y de contacto vital proporcionada por Aura Smartcare.">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-primary': '#006FFF',
                        'brand-secondary': '#C3DDFF',
                        'text-title': '#1A1A1A',
                        'text-body': '#4A4A4A',
                        'surface-main': '#FFFFFF',
                        'surface-secondary': '#FAFAFA',
                        'status-success': '#22C55E',
                        'status-warning': '#F59E0B',
                        'status-error': '#EF4444',
                        'status-info': '#3B82F6',
                        'line': '#C4C4C4',
                        'cta': '#CA8A04',
                    },
                    spacing: {
                        'container-padding-pc': '64px',
                        'container-padding-mb': '16px',
                        'spacing-2xl': '80px',
                        'spacing-2xl-mb': '40px',
                        'spacing-xl': '128px',
                        'spacing-xl-mb': '64px',
                        'spacing-lg': '48px',
                        'spacing-lg-mb': '24px',
                        'spacing-md': '32px',
                        'spacing-md-mb': '16px',
                        'spacing-sm': '16px',
                        'spacing-sm-mb': '12px',
                        'spacing-xs': '8px',
                        'spacing-xs-mb': '8px',
                    },
                    borderRadius: {
                        'radius-xl': '40px',
                        'radius-xl-mb': '24px',
                        'radius-lg': '24px',
                        'radius-lg-mb': '16px',
                        'radius-md': '12px',
                        'radius-md-mb': '8px',
                        'radius-sm': '8px',
                        'radius-full': '9999px',
                    },
                    fontSize: {
                        'aura-h1': '82px', 'aura-h1-mb': '40px',
                        'aura-h2': '48px', 'aura-h2-mb': '32px',
                        'aura-h3': '32px', 'aura-h3-mb': '24px',
                        'aura-h4': '28px', 'aura-h4-mb': '20px',
                        'aura-sub': '22px', 'aura-sub-mb': '16px',
                        'aura-body': '20px', 'aura-body-mb': '18px',
                        'aura-small': '14px',
                    },
                    fontFamily: {
                        heading: ['"Plus Jakarta Sans"', 'sans-serif'],
                        body: ['"Inter"', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03)',
                        'card-hover': '0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04)',
                    },
                    transitionTimingFunction: { 'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.275)' }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA;
            color: #1A1A1A;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .premium-shadow {
            box-shadow: 0 4px 24px -4px rgba(15, 23, 42, 0.04), 0 16px 40px -8px rgba(15, 23, 42, 0.08);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast-enter {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="antialiased selection:bg-brand-primary selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ── SUPABASE — tus credenciales originales ──
        const SUPABASE_URL = 'https://ajpiwjjiazfksrgylyct.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqcGl3amppYXpma3NyZ3lseWN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDk3NzksImV4cCI6MjA5MTA4NTc3OX0.DtU4gBlAfTA8wUk-Da1nvmx-FSW7LpB2yoyqwRs-XjA';
        const auraClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ── ICONS ──
        const Phone = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" /></svg>;
        const AlertCircle = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>;
        const ShieldAlert = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>;
        const Info = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>;
        const MapPin = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></svg>;
        const Share = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" /><line x1="8.59" y1="13.51" x2="15.42" y2="17.49" /><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" /></svg>;
        const Settings = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>;
        const CheckCircle = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>;
        const Loader = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} animate-spin`}><line x1="12" y1="2" x2="12" y2="6" /><line x1="12" y1="18" x2="12" y2="22" /><line x1="4.93" y1="4.93" x2="7.76" y2="7.76" /><line x1="16.24" y1="16.24" x2="19.07" y2="19.07" /><line x1="2" y1="12" x2="6" y2="12" /><line x1="18" y1="12" x2="22" y2="12" /><line x1="4.93" y1="19.07" x2="7.76" y2="16.24" /><line x1="16.24" y1="7.76" x2="19.07" y2="4.93" /></svg>;
        const ArrowLeft = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>;

        // ── BUTTON ──
        const Button = ({ children, variant = "primary", className = "", disabled = false, ...props }) => {
            const base = "inline-flex items-center justify-center font-bold rounded-radius-full transition-all duration-300 ease-out cursor-pointer active:scale-95 px-spacing-sm py-spacing-xs gap-spacing-xs disabled:opacity-60 disabled:cursor-not-allowed";
            const variants = {
                primary: "bg-brand-primary text-white hover:bg-opacity-90 hover:shadow-lg hover:-translate-y-0.5 shadow-md",
                secondary: "bg-surface-main text-text-title border border-line hover:bg-surface-secondary hover:shadow-md hover:-translate-y-0.5",
                danger: "bg-status-error text-white hover:bg-red-700 hover:shadow-lg hover:-translate-y-0.5 shadow-md",
                success: "bg-status-success text-white hover:bg-green-600 hover:shadow-lg hover:-translate-y-0.5 shadow-md",
                ghost: "bg-transparent text-text-body hover:bg-surface-secondary",
            };
            return <button disabled={disabled} className={`${base} ${variants[variant]} ${className}`} {...props}>{children}</button>;
        };

        // ── INPUT ──
        const Input = ({ label, ...props }) => (
            <div className="flex flex-col gap-spacing-xs-mb">
                {label && <label className="text-aura-small font-semibold text-text-body">{label}</label>}
                <input className="w-full border border-line rounded-radius-md px-spacing-sm py-spacing-xs text-aura-small text-text-title bg-surface-main outline-none focus:ring-2 focus:ring-brand-primary focus:border-brand-primary transition-all" {...props} />
            </div>
        );

        const Textarea = ({ label, ...props }) => (
            <div className="flex flex-col gap-spacing-xs-mb">
                {label && <label className="text-aura-small font-semibold text-text-body">{label}</label>}
                <textarea className="w-full border border-line rounded-radius-md px-spacing-sm py-spacing-xs text-aura-small text-text-title bg-surface-main outline-none focus:ring-2 focus:ring-brand-primary focus:border-brand-primary transition-all resize-none" rows={3} {...props} />
            </div>
        );

        // ── LOGO ──
        const Logo = ({ white = false }) => (
            <a href="/" className="flex items-center transition-transform hover:scale-105 active:scale-95">
                <img src="./assets/logo-brand.png" alt="Aura Smartcare" className={`h-7 w-auto object-contain ${white ? 'brightness-0 invert' : ''}`} />
            </a>
        );

        // ── TOAST ──
        const Toast = ({ message, type = "success", onClose }) => {
            useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
            const colors = { success: "bg-status-success", error: "bg-status-error", info: "bg-brand-primary" };
            return (
                <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-50 ${colors[type]} text-white text-aura-small font-semibold px-spacing-sm py-spacing-xs rounded-radius-full shadow-card-hover flex items-center gap-spacing-xs toast-enter whitespace-nowrap`}>
                    {type === "success" && <CheckCircle className="w-4 h-4" />}
                    {type === "error" && <AlertCircle className="w-4 h-4" />}
                    {type === "info" && <MapPin className="w-4 h-4" />}
                    {message}
                </div>
            );
        };

        // ════════════════════════════════════
        // VISTA: CARGANDO
        // ════════════════════════════════════
        const ViewCargando = () => (
            <div className="flex flex-col items-center justify-center min-h-[400px] gap-spacing-sm">
                <Loader className="w-10 h-10 text-brand-primary" />
                <p className="text-aura-small text-text-body font-medium">Cargando ficha...</p>
            </div>
        );

        // ════════════════════════════════════
        // VISTA: ERROR
        // ════════════════════════════════════
        const ViewError = () => (
            <div className="flex flex-col items-center justify-center min-h-[400px] gap-spacing-sm px-container-padding-mb text-center">
                <AlertCircle className="w-12 h-12 text-status-error" />
                <h2 className="text-aura-h4-mb font-heading font-bold text-text-title">ID no encontrado</h2>
                <p className="text-aura-small text-text-body">Esta pulsera no está registrada en el sistema o el link es incorrecto.</p>
            </div>
        );

        // ════════════════════════════════════
        // VISTA: ACTIVACIÓN (primera vez)
        // ════════════════════════════════════
        const ViewActivacion = ({ currentId, onRegistrado }) => {
            const [form, setForm] = useState({ nombre: '', alergias: '', contacto: '', pin: '', email: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (form.pin.length !== 4 || isNaN(form.pin)) { setError('El PIN debe ser de exactamente 4 dígitos numéricos.'); return; }
                setLoading(true); setError('');
                const { error } = await auraClient.from('pulseras').update({
                    nombre_portador: form.nombre, alergias: form.alergias,
                    contacto_emergencia: form.contacto, pin: form.pin,
                    email_respaldo: form.email, registrada: true,
                }).eq('id_unico', currentId);
                if (error) { setError(error.message); setLoading(false); } else { onRegistrado(); }
            };

            return (
                <div className="fade-in px-container-padding-mb py-spacing-md">
                    <div className="flex flex-col items-center text-center mb-spacing-md">
                        <Logo />
                        <div className="mt-spacing-sm w-14 h-14 rounded-radius-full bg-brand-secondary flex items-center justify-center mb-spacing-xs">
                            <ShieldAlert className="w-7 h-7 text-brand-primary" />
                        </div>
                        <h2 className="text-aura-h3-mb font-heading font-bold text-text-title">Activar Aura</h2>
                        <p className="text-aura-small text-text-body mt-spacing-xs-mb">Vincula tu pulsera completando la información médica.</p>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-spacing-xs">
                        <Input label="Nombre completo del portador" name="nombre" required placeholder="Ej: Mateo García" value={form.nombre} onChange={handleChange} />
                        <Textarea label="Alergias y condiciones médicas" name="alergias" required placeholder="Ej: Alergia a la penicilina, asma leve..." value={form.alergias} onChange={handleChange} />
                        <Input label="Teléfono de emergencia" name="contacto" required type="tel" placeholder="+56 9 1234 5678" value={form.contacto} onChange={handleChange} />
                        <Input label="Email de respaldo" name="email" required type="email" placeholder="tu@email.com" value={form.email} onChange={handleChange} />
                        <Input label="PIN de seguridad (4 dígitos)" name="pin" required type="password" maxLength={4} placeholder="••••" value={form.pin} onChange={handleChange} />
                        <p className="text-aura-small text-text-body">Este PIN lo necesitarás para editar la ficha. Guárdalo en un lugar seguro.</p>
                        {error && (
                            <div className="flex items-center gap-spacing-xs bg-red-50 border border-status-error/20 rounded-radius-md px-spacing-xs py-spacing-xs-mb">
                                <AlertCircle className="w-4 h-4 text-status-error shrink-0" />
                                <p className="text-aura-small text-status-error font-medium">{error}</p>
                            </div>
                        )}
                        <Button type="submit" variant="primary" className="w-full py-spacing-sm text-aura-body-mb" disabled={loading}>
                            {loading && <Loader className="w-5 h-5" />}
                            {loading ? 'Activando...' : 'Activar pulsera'}
                        </Button>
                    </form>
                </div>
            );
        };

        // ════════════════════════════════════
        // VISTA: FICHA (solo lectura)
        // ════════════════════════════════════
        const ViewFicha = ({ data, onEditar, setToast }) => {
            const [locationState, setLocationState] = useState('idle');

            const handleUbicacion = () => {
                if (!navigator.geolocation) { setToast({ message: "Tu navegador no soporta geolocalización.", type: "error" }); return; }
                setLocationState('loading');
                navigator.geolocation.getCurrentPosition(
                    ({ coords }) => {
                        const mapsUrl = `https://maps.google.com/?q=${coords.latitude},${coords.longitude}`;
                        const telefono = data.contacto_emergencia.replace('+', '').replace(/\s/g, '');
                        const mensaje = encodeURIComponent(`Hola, encontré a ${data.nombre_portador} y quiero avisarte. Mi ubicación: ${mapsUrl}`);
                        setLocationState('done');
                        setToast({ message: "Ubicación obtenida. Abriendo WhatsApp...", type: "success" });
                        setTimeout(() => { window.open(`https://wa.me/${telefono}?text=${mensaje}`, '_blank'); setTimeout(() => setLocationState('idle'), 3000); }, 800);
                    },
                    (err) => {
                        const msgs = { 1: "Permiso denegado.", 2: "No se pudo obtener ubicación.", 3: "Tiempo agotado." };
                        setToast({ message: msgs[err.code] || "Error de ubicación.", type: "error" });
                        setLocationState('error');
                        setTimeout(() => setLocationState('idle'), 3000);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };

            const locationBtn = {
                idle: { label: "Compartir mi ubicación", icon: <MapPin className="w-5 h-5" />, variant: "secondary" },
                loading: { label: "Obteniendo ubicación...", icon: <Loader className="w-5 h-5" />, variant: "secondary" },
                done: { label: "¡Ubicación enviada!", icon: <CheckCircle className="w-5 h-5" />, variant: "success" },
                error: { label: "Reintentar", icon: <MapPin className="w-5 h-5" />, variant: "secondary" },
            }[locationState];

            return (
                <div className="fade-in">
                    {/* HEADER AZUL */}
                    <div className="bg-brand-primary pt-spacing-sm pb-spacing-2xl-mb px-container-padding-mb rounded-b-radius-xl relative overflow-hidden shadow-lg">
                        <div className="absolute top-[-20%] right-[-20%] w-[60%] h-[80%] bg-white/10 rounded-full blur-[80px] pointer-events-none"></div>
                        <div className="absolute top-[30%] left-[-10%] w-[40%] h-[40%] bg-cta/10 rounded-full blur-[60px] pointer-events-none"></div>
                        <div className="relative z-10 flex flex-col items-center">
                            <div className="w-full flex justify-between items-center mb-spacing-md-mb">
                                <Logo white />
                                <div className="flex items-center gap-spacing-xs">
                                    <span className="bg-status-error/20 text-red-100 text-[10px] px-spacing-xs py-1 rounded-radius-full font-bold uppercase tracking-wider border border-status-error/30 flex items-center gap-1 animate-pulse">
                                        <AlertCircle className="w-3 h-3" /> Perfil Médico
                                    </span>
                                    {/* BOTÓN CONFIGURAR */}
                                    <button onClick={onEditar} className="w-8 h-8 rounded-radius-full bg-white/10 border border-white/20 flex items-center justify-center text-white hover:bg-white/20 transition-all cursor-pointer" title="Editar ficha">
                                        <Settings className="w-4 h-4" />
                                    </button>
                                </div>
                            </div>
                            <div className="w-28 h-28 rounded-radius-full border-4 border-white/20 overflow-hidden shadow-2xl mb-spacing-xs">
                                <img src="https://i.pravatar.cc/150?img=11" alt="Foto de Perfil" className="w-full h-full object-cover" />
                            </div>
                            <h1 className="text-aura-h3-mb font-heading font-bold text-white text-center leading-tight mb-spacing-xs-mb">{data.nombre_portador}</h1>
                            <p className="text-brand-secondary text-aura-small font-medium">Perfil de emergencia activo</p>
                        </div>
                    </div>

                    {/* CONTENIDO */}
                    <div className="px-container-padding-mb md:px-spacing-md -mt-spacing-md relative z-20 space-y-spacing-xs">
                        {/* Llamada emergencia */}
                        <div className="bg-surface-main rounded-radius-lg p-spacing-sm premium-shadow border border-line flex flex-col items-center text-center">
                            <p className="text-aura-small text-text-body mb-spacing-xs leading-relaxed font-medium">Si lo has encontrado, mantén la calma y comunícate con sus familiares.</p>
                            <a href={`tel:${data.contacto_emergencia}`} className="w-full">
                                <Button variant="danger" className="w-full py-spacing-sm text-aura-body-mb">
                                    <Phone className="w-5 h-5 fill-current" /> Llamar a emergencias
                                </Button>
                            </a>
                        </div>

                        <h2 className="text-aura-sub-mb font-heading font-bold text-text-title pl-spacing-xs-mb pt-spacing-xs">Datos Vitales</h2>

                        {/* Alergias desde Supabase */}
                        <div className="bg-orange-50 rounded-radius-lg p-spacing-sm border border-orange-100 flex flex-col hover:bg-orange-100/40 transition-colors">
                            <div className="flex items-center gap-spacing-xs mb-spacing-xs">
                                <div className="w-10 h-10 rounded-radius-full bg-orange-100 text-status-warning flex items-center justify-center">
                                    <ShieldAlert className="w-5 h-5" />
                                </div>
                                <span className="text-aura-small text-orange-900 font-bold uppercase tracking-wider">Alergias y condiciones</span>
                            </div>
                            <p className="text-aura-body-mb font-heading font-bold text-orange-900 leading-snug">{data.alergias}</p>
                        </div>

                        {/* Notas opcionales */}
                        {data.notas && (
                            <div className="bg-surface-main rounded-radius-lg p-spacing-sm premium-shadow border border-line relative overflow-hidden">
                                <h3 className="text-aura-small text-text-body font-bold uppercase tracking-wider mb-spacing-xs flex items-center gap-spacing-xs-mb">
                                    <Info className="w-4 h-4 text-cta" /> Instrucciones adicionales
                                </h3>
                                <p className="text-text-title font-medium leading-relaxed text-aura-small">{data.notas}</p>
                            </div>
                        )}

                        {/* Botones */}
                        <div className="pt-spacing-xs flex flex-col gap-spacing-xs">
                            <Button variant={locationBtn.variant} className="w-full py-spacing-sm text-aura-body-mb" onClick={handleUbicacion} disabled={locationState === 'loading'}>
                                {locationBtn.icon} {locationBtn.label}
                            </Button>
                            <Button variant="secondary" className="w-full py-spacing-sm text-aura-body-mb" onClick={() => {
                                if (navigator.share) { navigator.share({ title: `Perfil - ${data.nombre_portador}`, url: window.location.href }); }
                                else { navigator.clipboard.writeText(window.location.href); setToast({ message: "Link copiado.", type: "info" }); }
                            }}>
                                <Share className="w-5 h-5" /> Compartir esta ficha
                            </Button>
                        </div>

                        <div className="w-full flex justify-center py-spacing-sm">
                            <p className="text-aura-small text-text-body font-medium flex items-center gap-spacing-xs-mb">
                                Protegido por <span className="font-heading font-bold text-text-title">AURA</span>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        // ════════════════════════════════════
        // VISTA: SOLICITAR PIN
        // ════════════════════════════════════
        const ViewPin = ({ data, onPinCorrecto, onCancelar }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (pin === data.pin) { onPinCorrecto(); }
                else { setError('PIN incorrecto. Inténtalo de nuevo.'); setPin(''); }
            };

            return (
                <div className="fade-in flex flex-col items-center justify-center min-h-[400px] px-container-padding-mb py-spacing-md">
                    <div className="w-14 h-14 rounded-radius-full bg-brand-secondary flex items-center justify-center mb-spacing-sm">
                        <Settings className="w-7 h-7 text-brand-primary" />
                    </div>
                    <h2 className="text-aura-h4-mb font-heading font-bold text-text-title mb-spacing-xs text-center">Ingresa tu PIN</h2>
                    <p className="text-aura-small text-text-body text-center mb-spacing-md">Necesitas el PIN que creaste al activar la pulsera.</p>
                    <form onSubmit={handleSubmit} className="w-full max-w-xs flex flex-col gap-spacing-xs">
                        <input
                            type="password" maxLength={4} value={pin} autoFocus
                            onChange={(e) => { setPin(e.target.value); setError(''); }}
                            placeholder="••••"
                            className="w-full border border-line rounded-radius-md px-spacing-sm py-spacing-sm text-center text-aura-h3-mb font-bold tracking-[1rem] text-text-title bg-surface-main outline-none focus:ring-2 focus:ring-brand-primary transition-all"
                        />
                        {error && (
                            <div className="flex items-center gap-spacing-xs bg-red-50 border border-status-error/20 rounded-radius-md px-spacing-xs py-spacing-xs-mb">
                                <AlertCircle className="w-4 h-4 text-status-error shrink-0" />
                                <p className="text-aura-small text-status-error font-medium">{error}</p>
                            </div>
                        )}
                        <Button type="submit" variant="primary" className="w-full py-spacing-sm text-aura-body-mb">Confirmar</Button>
                        <Button type="button" variant="ghost" className="w-full py-spacing-sm text-aura-body-mb" onClick={onCancelar}>
                            <ArrowLeft className="w-4 h-4" /> Cancelar
                        </Button>
                    </form>
                </div>
            );
        };

        // ════════════════════════════════════
        // VISTA: EDITAR
        // ════════════════════════════════════
        const ViewEditar = ({ data, currentId, onGuardado, onCancelar, setToast }) => {
            const [form, setForm] = useState({ nombre: data.nombre_portador, alergias: data.alergias, contacto: data.contacto_emergencia, notas: data.notas || '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

            const handleSubmit = async (e) => {
                e.preventDefault(); setLoading(true); setError('');
                const { error } = await auraClient.from('pulseras').update({
                    nombre_portador: form.nombre, alergias: form.alergias,
                    contacto_emergencia: form.contacto, notas: form.notas,
                }).eq('id_unico', currentId);
                if (error) { setError(error.message); setLoading(false); }
                else { setToast({ message: "Ficha actualizada correctamente.", type: "success" }); onGuardado(); }
            };

            return (
                <div className="fade-in px-container-padding-mb py-spacing-md">
                    <div className="flex items-center gap-spacing-xs mb-spacing-md">
                        <button onClick={onCancelar} className="w-8 h-8 rounded-radius-full bg-surface-secondary border border-line flex items-center justify-center text-text-body hover:bg-surface-main transition-all cursor-pointer">
                            <ArrowLeft className="w-4 h-4" />
                        </button>
                        <h2 className="text-aura-sub-mb font-heading font-bold text-text-title">Editar ficha</h2>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-spacing-xs">
                        <Input label="Nombre completo" name="nombre" required value={form.nombre} onChange={handleChange} />
                        <Textarea label="Alergias y condiciones médicas" name="alergias" required value={form.alergias} onChange={handleChange} />
                        <Input label="Teléfono de emergencia" name="contacto" required type="tel" value={form.contacto} onChange={handleChange} />
                        <Textarea label="Instrucciones adicionales (opcional)" name="notas" placeholder="Ej: Tiene miedo a los perros..." value={form.notas} onChange={handleChange} />
                        {error && (
                            <div className="flex items-center gap-spacing-xs bg-red-50 border border-status-error/20 rounded-radius-md px-spacing-xs py-spacing-xs-mb">
                                <AlertCircle className="w-4 h-4 text-status-error shrink-0" />
                                <p className="text-aura-small text-status-error font-medium">{error}</p>
                            </div>
                        )}
                        <Button type="submit" variant="primary" className="w-full py-spacing-sm text-aura-body-mb" disabled={loading}>
                            {loading ? <Loader className="w-5 h-5" /> : <CheckCircle className="w-5 h-5" />}
                            {loading ? 'Guardando...' : 'Guardar cambios'}
                        </Button>
                        <Button type="button" variant="ghost" className="w-full py-spacing-sm text-aura-body-mb" onClick={onCancelar}>Cancelar</Button>
                    </form>
                </div>
            );
        };

        // ════════════════════════════════════
        // COMPONENTE PRINCIPAL — maneja vistas
        // ════════════════════════════════════
        const AuraFicha = () => {
            // vistas: 'cargando' | 'error' | 'activacion' | 'ficha' | 'pin' | 'editar'
            const [vista, setVista] = useState('cargando');
            const [data, setData] = useState(null);
            const [currentId, setCurrentId] = useState(null);
            const [toast, setToast] = useState(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { setVista('error'); return; }
                setCurrentId(id);
                cargarDatos(id);
            }, []);

            const cargarDatos = async (id) => {
                const { data, error } = await auraClient.from('pulseras').select('*').eq('id_unico', id).single();
                if (error || !data) { setVista('error'); return; }
                setData(data);
                setVista(data.registrada ? 'ficha' : 'activacion');
            };

            const recargar = () => cargarDatos(currentId);

            return (
                <div className="bg-surface-secondary min-h-screen font-body pb-spacing-lg w-full max-w-lg mx-auto md:shadow-2xl md:min-h-[800px] md:my-spacing-sm md:rounded-radius-xl overflow-hidden relative border border-line">
                    {vista === 'cargando' && <ViewCargando />}
                    {vista === 'error' && <ViewError />}
                    {vista === 'activacion' && <ViewActivacion currentId={currentId} onRegistrado={recargar} />}
                    {vista === 'ficha' && data && <ViewFicha data={data} setToast={setToast} onEditar={() => setVista('pin')} />}
                    {vista === 'pin' && data && <ViewPin data={data} onPinCorrecto={() => setVista('editar')} onCancelar={() => setVista('ficha')} />}
                    {vista === 'editar' && data && <ViewEditar data={data} currentId={currentId} setToast={setToast} onGuardado={recargar} onCancelar={() => setVista('ficha')} />}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuraFicha />);
    </script>
</body>

</html>
